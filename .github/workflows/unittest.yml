name: Unit Test

on:
  push:
    branches: [ "main", "master" ]
    paths: &python_paths
      - "**.py"
      - "metadata.yaml"
      - "requirements.txt"
      - "pyproject.toml"
  pull_request:
    branches: [ "*" ]
    paths: *python_paths

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests
        run: uv run pytest -W ignore