name: Build and Release

env:
  previous_tag: ""
  zip_name: "astrbot_plugin_kook_adapter.zip"

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以生成准确的 changelog

      - run: echo "previous_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> $GITHUB_ENV

      - name: Generate Changelog
        id: changelog
        uses: jaywcjlove/changelog-generator@main
        if: env.previous_tag
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip Project
        run: |
          PARENT_DIR=$(dirname "${{ github.workspace }}")
          CURRENT_DIR=$(basename "${{ github.workspace }}")
          
          cd "$PARENT_DIR"
          
          zip -r "${{ github.workspace }}/${{ env.zip_name }}" "$CURRENT_DIR" \
            -x "$CURRENT_DIR/.*" \
            -x "**/__pycache__/**" \
            -x "$CURRENT_DIR/tests/**" \
            -x "$CURRENT_DIR/data/**" \
            -x "$CURRENT_DIR/pyproject.toml" \
            -x "$CURRENT_DIR/ruff.toml" \
            -x "$CURRENT_DIR/uv.lock" \
            -x "$CURRENT_DIR/.git/**" \
            -x "$CURRENT_DIR/.github/**"

      - name: Inspect package
        run: zipinfo -1 ${{ env.zip_name }} 

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.zip_name }}
          path: ${{ env.zip_name }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            ${{ env.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
