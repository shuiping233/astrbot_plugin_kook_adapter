name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以生成准确的 changelog

      - name: Zip Project
        run: |
          zip -r astrbot_plugin_kook_adapter.zip . -x "*.git*" "*.github*" "*__pycache__*" "*.pytest_cache*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            astrbot_plugin_kook_adapter.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}