name: Build and Release

env:
  previous_tag: ""
  sync_version_script_name: "get_latest_tag_and_set.sh"
  zip_name: "astrbot_plugin_kook_adapter.zip"

on:
  push:
    # branches:
    #   - main
    #   - master
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以生成准确的 changelog

      - name: Sync version files
        id: sync_step
        run: |
          chmod +x ./${{ env.sync_version_script_name }}
          ./${{ env.sync_version_script_name }}

      - name: Commit and Push Changes
        if: steps.sync_step.outputs.should_sync == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump version to ${{ steps.sync_step.outputs.tag_name }} [skip ci]"
          file_pattern: "metadata.yaml pyproject.toml"
          branch: ${{ github.event.repository.default_branch }}
          push_options: '--force'

      - run: echo "previous_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> $GITHUB_ENV

      - name: Generate Changelog
        id: changelog
        uses: jaywcjlove/changelog-generator@main
        if: env.previous_tag
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filter-author: (github-actions|github-actions\[bot\]|dependabot|renovate\\[bot\\])
          # 过滤掉 Release 相关的提交，避免重复记录
          filter: '([R|r]elease[d]\s+[v|V]\d(\.\d+){0,2}|.*\[skip ci\].*)'
          template: |
            ## 📝 更新日志 (${{ steps.sync_step.outputs.tag_name }})

            ### 🌟 新特性
            {{feat,feature}}

            ### 🛠️ 修复与优化
            {{fix,bugfix,perf,refactor}}

            ### 📖 文档更新
            {{docs,doc}}

            ---
            #### 🏗️ 内部变更 (忽略即可)
            {{chore,style,ci,test,unittest||🔶 _无重大内部变动_}}

            #### 其他
            {{__unknown__}}

            **完整对比记录**: {{comparision}}

      - name: Zip Project
        run: |
          PARENT_DIR=$(dirname "${{ github.workspace }}")
          CURRENT_DIR=$(basename "${{ github.workspace }}")

          cd "$PARENT_DIR"

          zip -r "${{ github.workspace }}/${{ env.zip_name }}" "$CURRENT_DIR" \
           -x "$CURRENT_DIR/.*" \
           -x "$CURRENT_DIR/*/.*" \
           -x "$CURRENT_DIR/__pycache__/*" \
           -x "$CURRENT_DIR/**/__pycache__/*" \
           -x "$CURRENT_DIR/tests/*" \
           -x "$CURRENT_DIR/data/*" \
           -x "$CURRENT_DIR/pyproject.toml" \
           -x "$CURRENT_DIR/ruff.toml" \
           -x "$CURRENT_DIR/uv.lock"

      - name: Inspect package
        run: zipinfo -1 ${{ env.zip_name }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.zip_name }}
          path: ${{ env.zip_name }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            ${{ env.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
